[env:bluepill]
platform = ststm32
board = bluepill_f103c8
framework = arduino
monitor_speed = 115200

upload_protocol = stlink

build_flags =
    -DHAL_PCD_MODULE_ENABLED
    -DUSBCON
    -DUSBD_USE_CDC
    -DUSBD_VID=0x0483
    -DUSBD_PID=0x5740
    -DUSB_MANUFACTURER="OSDP"
    -DUSB_PRODUCT="OSDP-Bridge"
    -DPIN_SERIAL1_TX=PA9
    -DPIN_SERIAL1_RX=PA10

; Bootloader lives at 0x08000000-0x08006FFF, app starts at 0x08007000
board_build.flash_offset = 0x7000
board_upload.maximum_size = 131072
board_upload.offset_address = 0x08007000

; Tell OpenOCD the C8 has 128KB flash (most Blue Pills do)
upload_flags =
    -c
    set FLASH_SIZE 0x20000
