[env:bootloader]
platform = ststm32
board = bluepill_f103c8
framework = arduino
upload_protocol = stlink

; Bootloader lives at 0x08000000, limited to first 28KB (0x7000)
; App starts at 0x08007000 — requires 128KB flash (most Blue Pills have it)
board_upload.maximum_size = 131072

build_flags =
    -DHAL_PCD_MODULE_ENABLED
    -DUSBCON
    -DUSBD_USE_CDC
    -DUSBD_VID=0x0483
    -DUSBD_PID=0x5741
    -DUSB_MANUFACTURER="OSDP"
    -DUSB_PRODUCT="OSDP-Bootloader"
    -DCDC_SERIAL_BUFFER_SIZE=1024
    -DAPP_ADDR=0x08007000UL
    -DAPP_MAX_SIZE=0x19000UL
    -Os
    -flto
    -Wl,--defsym=LD_MAX_SIZE=0x7000
    -Wl,--defsym=LD_MAX_DATA_SIZE=0x5000
