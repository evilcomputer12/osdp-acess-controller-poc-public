<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#1a202c" />
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #1a202c; }
      .subtitle { font: 600 19px Arial, sans-serif; fill: #1a202c; }
      .label { font: 500 16px Arial, sans-serif; fill: #1a202c; }
      .small { font: 400 15px Arial, sans-serif; fill: #2d3748; }
      .box { rx: 18; ry: 18; stroke: #1a202c; stroke-width: 2; }
      .wire { stroke: #1a202c; stroke-width: 3; fill: none; }
      .arrow { stroke: #1a202c; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="720" fill="#f7fafc" />
  <text x="50" y="55" class="title">MAX485-Style RS-485 Link in an OSDP Controller/Test Bench</text>

  <rect x="80" y="180" width="260" height="240" class="box" fill="#fed7d7"/>
  <text x="210" y="220" text-anchor="middle" class="subtitle">STM32 Blue Pill</text>
  <text x="210" y="255" text-anchor="middle" class="small">USART TX/RX</text>
  <text x="210" y="280" text-anchor="middle" class="small">GPIO for DE/RE direction control</text>
  <text x="210" y="305" text-anchor="middle" class="small">firmware builds OSDP frames</text>
  <text x="210" y="330" text-anchor="middle" class="small">and parses responses</text>

  <rect x="430" y="150" width="310" height="300" class="box" fill="#bee3f8"/>
  <text x="585" y="195" text-anchor="middle" class="subtitle">MAX485 / TTL-to-RS485 Module</text>
  <text x="470" y="245" class="label">DI</text>
  <text x="470" y="285" class="label">RO</text>
  <text x="470" y="325" class="label">DE</text>
  <text x="470" y="365" class="label">RE</text>
  <text x="650" y="245" class="label">A</text>
  <text x="650" y="285" class="label">B</text>
  <text x="650" y="325" class="label">VCC</text>
  <text x="650" y="365" class="label">GND</text>
  <text x="585" y="415" text-anchor="middle" class="small">Converts single-ended TTL UART</text>
  <text x="585" y="438" text-anchor="middle" class="small">into differential RS-485 signaling</text>

  <rect x="850" y="180" width="260" height="240" class="box" fill="#c6f6d5"/>
  <text x="980" y="220" text-anchor="middle" class="subtitle">OSDP Reader / Peripheral Device</text>
  <text x="980" y="255" text-anchor="middle" class="small">addressed slave on RS-485 bus</text>
  <text x="980" y="280" text-anchor="middle" class="small">responds to POLL, ID, CAP, LED,</text>
  <text x="980" y="305" text-anchor="middle" class="small">BUZ, COMSET, KEYSET, SC, etc.</text>

  <line x1="340" y1="245" x2="430" y2="245" class="arrow"/>
  <text x="380" y="230" text-anchor="middle" class="label">TX → DI</text>
  <line x1="430" y1="285" x2="340" y2="285" class="arrow"/>
  <text x="380" y="270" text-anchor="middle" class="label">RO → RX</text>
  <line x1="340" y1="325" x2="430" y2="325" class="arrow"/>
  <text x="380" y="310" text-anchor="middle" class="label">GPIO → DE</text>
  <line x1="340" y1="365" x2="430" y2="365" class="arrow"/>
  <text x="380" y="350" text-anchor="middle" class="label">GPIO → RE</text>

  <line x1="740" y1="245" x2="850" y2="245" class="wire"/>
  <line x1="740" y1="285" x2="850" y2="285" class="wire"/>
  <text x="795" y="230" text-anchor="middle" class="label">A</text>
  <text x="795" y="270" text-anchor="middle" class="label">B</text>
  <text x="770" y="205" class="small">Differential pair</text>

  <rect x="90" y="510" width="1020" height="130" class="box" fill="#edf2f7"/>
  <text x="600" y="548" text-anchor="middle" class="subtitle">Why RS-485 + OSDP matters here</text>
  <text x="130" y="582" class="small">• OSDP uses a two-wire multidrop bus instead of legacy 12+ wire reader interfaces.</text>
  <text x="130" y="607" class="small">• The MAX485-style module handles the electrical layer; the STM32 firmware handles the protocol framing and timing.</text>
  <text x="130" y="632" class="small">• Secure Channel adds AES-128 protected communication when controller and reader share a valid SCBK.</text>
</svg>