<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .wire { stroke: #4f81bd; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .symbol { stroke: #4f81bd; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .fill { fill: #4f81bd; stroke: #4f81bd; stroke-width: 3; }
      .label { font: 500 30px Arial, sans-serif; fill: #000; }
      .small { font: 400 24px Arial, sans-serif; fill: #000; }
      .tiny { font: 400 20px Arial, sans-serif; fill: #000; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f81bd" />
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#ffffff"/>

  <path d="M 760 70 H 1070" class="wire"/>
  <path d="M 700 170 V 610 H 180" class="wire"/>
  <path d="M 180 610 H 1090" class="wire"/>
  <path d="M 700 70 V 170" class="wire"/>
  <path d="M 990 120 V 610" class="wire" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <text x="1080" y="88" class="label">+</text>
  <text x="1085" y="628" class="label">−</text>
  <text x="1015" y="380" class="small">12V</text>

  <rect x="700" y="220" width="76" height="180" rx="4" ry="4" class="fill" opacity="0.92"/>
  <text x="792" y="315" class="label">Relay</text>

  <path d="M 700 220 H 560" class="wire"/>
  <path d="M 560 220 V 450 H 700" class="wire"/>
  <path d="M 560 280 H 610" class="symbol"/>
  <polygon points="560,330 610,250 660,330" class="fill"/>
  <path d="M 610 250 V 210" class="symbol"/>
  <path d="M 610 360 V 450" class="symbol"/>
  <text x="120" y="260" class="small">1N4007 Flyback Diode</text>

  <circle cx="660" cy="520" r="96" class="symbol"/>
  <path d="M 660 424 V 345" class="wire"/>
  <path d="M 660 616 V 610" class="wire"/>
  <path d="M 566 520 H 474" class="wire"/>
  <path d="M 620 478 V 562" class="symbol"/>
  <path d="M 620 494 H 680" class="symbol"/>
  <path d="M 620 546 L 722 594" class="symbol"/>
  <path d="M 620 500 L 720 444" class="symbol"/>
  <path d="M 720 444 V 345" class="symbol"/>
  <path d="M 722 594 V 610" class="symbol"/>
  <polygon points="686,569 722,594 678,603" class="fill"/>
  <text x="640" y="534" class="small">BC 548</text>

  <rect x="320" y="490" width="126" height="52" rx="10" ry="10" class="fill" opacity="0.85"/>
  <text x="366" y="470" class="tiny">1kΩ</text>

  <text x="58" y="514" class="small">Blue Pill GPIO</text>
  <path d="M 190 516 H 320" class="wire"/>
  <path d="M 446 516 H 474" class="wire"/>

  <text x="58" y="642" class="small">Blue Pill GND</text>
  <path d="M 185 610 H 58" class="wire"/>

  <text x="60" y="706" class="tiny">The transistor switches the relay coil from a logic signal, while the flyback diode clamps the inductive kick when the coil is released.</text>
</svg>